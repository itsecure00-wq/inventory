<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>库存盘点</title>
  <style>
    /* ── Reset & base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --red:       #d32f2f;
      --red-light: #ffcdd2;
      --gray:      #757575;
      --gray-bg:   #f5f5f5;
      --border:    #e0e0e0;
      --text:      #212121;
      --white:     #ffffff;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Noto Sans SC', sans-serif;
      background: var(--gray-bg);
      color: var(--text);
      min-height: 100vh;
      font-size: 14px;
    }

    /* ════════════════════════════════
       LOGIN VIEW
    ════════════════════════════════ */
    #loginView {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 32px 24px;
      background: var(--white);
    }
    .login-logo  { font-size: 52px; margin-bottom: 8px; }
    .login-brand { font-size: 16px; font-weight: 700; color: var(--red); margin-bottom: 4px; }
    .login-sub   { font-size: 12px; color: var(--gray); margin-bottom: 40px; }

    .login-form   { width: 100%; max-width: 320px; }
    .form-group   { margin-bottom: 16px; }
    .form-label   { display: block; font-size: 12px; color: var(--gray); margin-bottom: 6px; font-weight: 500; }
    .form-input   {
      width: 100%; padding: 12px 14px;
      border: 1.5px solid var(--border); border-radius: 8px;
      font-size: 15px; outline: none; transition: border-color .2s;
      -webkit-appearance: none;
    }
    .form-input:focus { border-color: var(--red); }

    .login-btn {
      width: 100%; padding: 13px;
      background: var(--red); color: var(--white);
      border: none; border-radius: 8px;
      font-size: 15px; font-weight: 600; cursor: pointer;
      margin-top: 8px;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: opacity .2s;
    }
    .login-btn:active   { opacity: .85; }
    .login-btn:disabled { opacity: .6; cursor: not-allowed; }

    .btn-spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,.4); border-top-color: #fff;
      border-radius: 50%; animation: spin .7s linear infinite; display: none;
    }
    .login-error {
      margin-top: 12px; padding: 10px 14px;
      background: #fce4e4; color: var(--red);
      border-radius: 6px; font-size: 13px; text-align: center; display: none;
    }

    /* ════════════════════════════════
       CHECK VIEW
    ════════════════════════════════ */
    #checkView { display: none; min-height: 100vh; }

    /* Topbar */
    .topbar {
      position: sticky; top: 0; z-index: 100;
      background: var(--red); color: var(--white);
      padding: 11px 14px;
      display: flex; align-items: center; justify-content: space-between;
      box-shadow: 0 2px 6px rgba(0,0,0,.25);
    }
    .topbar-title { font-size: 15px; font-weight: 600; }
    .topbar-sub   { font-size: 11px; opacity: .8; margin-top: 1px; }
    .logout-btn {
      background: rgba(255,255,255,.2); border: 1px solid rgba(255,255,255,.35);
      color: var(--white); padding: 5px 11px; border-radius: 6px;
      font-size: 12px; cursor: pointer; white-space: nowrap;
    }

    /* Progress */
    .progress-wrap {
      background: var(--white); padding: 10px 16px 8px;
      border-bottom: 1px solid var(--border);
    }
    .progress-label {
      display: flex; justify-content: space-between;
      font-size: 11px; color: var(--gray); margin-bottom: 5px;
    }
    .progress-track { height: 5px; background: var(--red-light); border-radius: 3px; overflow: hidden; }
    .progress-fill  { height: 100%; background: var(--red); border-radius: 3px; transition: width .4s ease; width: 0%; }

    /* Category tabs */
    .cat-tabs {
      background: var(--white); border-bottom: 1px solid var(--border);
      display: flex; overflow-x: auto;
      -webkit-overflow-scrolling: touch; scrollbar-width: none;
    }
    .cat-tabs::-webkit-scrollbar { display: none; }
    .cat-tab {
      flex: 0 0 auto; padding: 9px 13px;
      font-size: 12px; color: var(--gray);
      cursor: pointer; white-space: nowrap;
      border-bottom: 2px solid transparent; transition: all .2s;
    }
    .cat-tab.active { color: var(--red); border-bottom-color: var(--red); font-weight: 600; }

    /* Status / spinner area */
    .status-area {
      padding: 48px 24px; text-align: center;
      color: var(--gray); font-size: 14px;
    }
    .spinner {
      width: 30px; height: 30px; margin: 0 auto 12px;
      border: 3px solid var(--red-light); border-top-color: var(--red);
      border-radius: 50%; animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Item cards */
    .items-list { padding: 6px 0 100px; }
    .item-card {
      background: var(--white); margin: 6px 10px; border-radius: 10px;
      padding: 12px; display: flex; align-items: center; gap: 12px;
      box-shadow: 0 1px 3px rgba(0,0,0,.08);
    }
    .item-card.filled { border-left: 3px solid #43a047; }

    .item-img {
      width: 52px; height: 52px; border-radius: 6px; object-fit: cover;
      background: var(--gray-bg); flex-shrink: 0;
    }
    .item-info  { flex: 1; min-width: 0; }
    .item-name  { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .item-meta  { font-size: 11px; color: var(--gray); margin-top: 2px; }
    .item-status {
      font-size: 10px; padding: 2px 6px; border-radius: 10px;
      display: inline-block; margin-top: 4px;
    }
    .item-status.ok       { background: #e8f5e9; color: #2e7d32; }
    .item-status.low      { background: #fff3e0; color: #e65100; }
    .item-status.critical { background: #fce4e4; color: var(--red); }
    .item-status.checked  { background: #e8f5e9; color: #2e7d32; }

    .qty-wrap  { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
    .qty-input {
      width: 60px; padding: 6px 8px;
      border: 1.5px solid var(--border); border-radius: 6px;
      font-size: 15px; text-align: center; outline: none; -webkit-appearance: none;
    }
    .qty-input:focus     { border-color: var(--red); }
    .qty-input.has-value { border-color: #43a047; background: #f1f8f1; }
    .qty-unit { font-size: 11px; color: var(--gray); white-space: nowrap; }

    /* Bottom bar */
    .bottom-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: var(--white); border-top: 1px solid var(--border);
      padding: 10px 14px;
      display: flex; align-items: center; justify-content: space-between;
      box-shadow: 0 -2px 8px rgba(0,0,0,.1); z-index: 90;
    }
    .bottom-count { font-size: 13px; color: var(--gray); }
    .bottom-count strong { color: var(--text); }
    .submit-btn {
      background: var(--red); color: var(--white);
      border: none; border-radius: 8px;
      padding: 10px 20px; font-size: 14px; font-weight: 600;
      cursor: pointer; transition: opacity .2s;
    }
    .submit-btn:active   { opacity: .85; }
    .submit-btn:disabled { opacity: .5; cursor: not-allowed; }

    /* Modal */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,.5);
      display: flex; align-items: center; justify-content: center; padding: 24px;
    }
    .modal-box {
      background: var(--white); border-radius: 12px;
      padding: 24px 20px; width: 100%; max-width: 320px; text-align: center;
    }
    .modal-icon  { font-size: 40px; margin-bottom: 10px; }
    .modal-title { font-size: 16px; font-weight: 700; margin-bottom: 8px; }
    .modal-msg   { font-size: 13px; color: var(--gray); margin-bottom: 20px; line-height: 1.5; white-space: pre-wrap; }
    .modal-btn {
      background: var(--red); color: var(--white); border: none;
      border-radius: 8px; padding: 10px 24px;
      font-size: 14px; font-weight: 600; cursor: pointer; width: 100%;
    }
    .modal-btn-outline {
      background: transparent; color: var(--text);
      border: 1.5px solid var(--border); border-radius: 8px;
      padding: 10px 24px; font-size: 14px; cursor: pointer;
      width: 100%; margin-top: 8px;
    }
    /* ── Add-item FAB ── */
    .add-item-fab {
      position: fixed; bottom: 88px; right: 16px; z-index: 150;
      width: 52px; height: 52px; border-radius: 50%;
      background: #37474f; color: #fff;
      border: none; font-size: 28px; line-height: 1;
      display: none; align-items: center; justify-content: center;
      box-shadow: 0 3px 10px rgba(0,0,0,.4);
      cursor: pointer;
    }

    /* ── Add-item sheet modal ── */
    .add-item-overlay {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,.45);
      display: none; align-items: flex-end; justify-content: center;
    }
    .add-item-overlay.show { display: flex; }
    .add-item-sheet {
      background: #fff; width: 100%; max-width: 480px;
      border-radius: 18px 18px 0 0;
      padding: 14px 20px 40px; max-height: 90vh; overflow-y: auto;
    }
    .ai-handle { width: 40px; height: 4px; border-radius: 2px; background: #ddd; margin: 0 auto 14px; }
    .ai-title  { font-size: 17px; font-weight: 700; color: #212121; margin-bottom: 18px; text-align: center; }
    .ai-photo-area {
      width: 100%; height: 110px;
      border: 2px dashed #bdbdbd; border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; margin-bottom: 4px;
      background: #fafafa; overflow: hidden;
    }
    .ai-photo-area img { width: 100%; height: 100%; object-fit: cover; border-radius: 10px; }
    .ai-photo-placeholder { font-size: 13px; color: #757575; text-align: center; }
    .ai-label { font-size: 12px; color: #757575; margin: 10px 0 4px; display: block; }
    .ai-input {
      width: 100%; padding: 10px 12px;
      border: 1px solid #e0e0e0; border-radius: 8px;
      font-size: 15px; color: #212121; background: #fafafa; margin-bottom: 2px;
    }
    .ai-input:focus { outline: none; border-color: #37474f; background: #fff; }
    .ai-save-btn {
      width: 100%; padding: 13px; margin-top: 20px;
      background: #37474f; color: #fff; border: none;
      border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer;
    }
    .ai-save-btn:disabled { background: #9e9e9e; cursor: not-allowed; }
    .ai-cancel-btn {
      width: 100%; padding: 11px; margin-top: 8px;
      background: #f5f5f5; color: #616161; border: none;
      border-radius: 8px; font-size: 14px; cursor: pointer;
    }
    /* Toast */
    #mcToast {
      position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,.78); color: #fff;
      padding: 9px 18px; border-radius: 20px; font-size: 13px;
      white-space: nowrap; z-index: 300; display: none;
    }

    /* ── Photo lightbox ── */
    #imgLightbox {
      position: fixed; inset: 0; z-index: 9999;
      background: rgba(0,0,0,.88);
      display: none; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 24px;
    }
    #imgLightbox.show { display: flex; }
    #imgLightbox img {
      max-width: 100%; max-height: 75vh;
      border-radius: 10px; object-fit: contain;
      box-shadow: 0 4px 24px rgba(0,0,0,.5);
    }
    #imgLightboxName {
      color: #fff; font-size: 15px; font-weight: 600;
      margin-top: 14px; text-align: center;
    }
    #imgLightboxClose {
      position: absolute; top: 16px; right: 20px;
      color: #fff; font-size: 28px; cursor: pointer;
      line-height: 1; opacity: .85;
    }
    .item-img { cursor: pointer; }
  </style>
</head>
<body>

<!-- ══════════════════════════════════════════════════════ -->
<!--  View 1 · Login                                        -->
<!-- ══════════════════════════════════════════════════════ -->
<div id="loginView">
  <div class="login-logo">🔥</div>
  <div class="login-brand">GLOBAL CHAIN F&amp;B</div>
  <div class="login-sub">库存管理系统 · 员工盘点</div>

  <div class="login-form">
    <div class="form-group">
      <label class="form-label" for="usernameInput">员工编号</label>
      <input class="form-input" id="usernameInput" type="text"
             inputmode="text" autocapitalize="off" autocorrect="off"
             placeholder="请输入员工编号">
    </div>
    <div class="form-group">
      <label class="form-label" for="passwordInput">密码</label>
      <input class="form-input" id="passwordInput" type="password" placeholder="请输入密码">
    </div>
    <button class="login-btn" id="loginBtn" onclick="doLogin()">
      <span class="btn-spinner" id="btnSpinner"></span>
      <span id="btnText">登录</span>
    </button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<!-- ══════════════════════════════════════════════════════ -->
<!--  View 2 · Check interface                              -->
<!-- ══════════════════════════════════════════════════════ -->
<div id="checkView">

  <!-- Topbar -->
  <div class="topbar">
    <div>
      <div class="topbar-title">🔥 库存盘点</div>
      <div class="topbar-sub" id="staffLabel"></div>
    </div>
    <button class="logout-btn" onclick="doLogout()">退出</button>
  </div>

  <!-- Progress bar -->
  <div class="progress-wrap">
    <div class="progress-label">
      <span id="progressText">盘点进度</span>
      <span id="progressPct">0%</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progressFill"></div>
    </div>
  </div>

  <!-- Category tabs -->
  <div class="cat-tabs" id="catTabs"></div>

  <!-- Status / loading -->
  <div class="status-area" id="statusArea">
    <div class="spinner"></div>
    <div>正在加载盘点数据...</div>
  </div>

  <!-- Item cards -->
  <div class="items-list" id="itemsList" style="display:none"></div>

  <!-- Fixed bottom bar -->
  <div class="bottom-bar">
    <div class="bottom-count">
      已填写 <strong id="filledCount">0</strong> / <span id="totalCount">0</span>
    </div>
    <button class="submit-btn" id="submitBtn" onclick="confirmSubmit()" disabled>
      提交盘点记录
    </button>
  </div>

</div>

<!-- Photo lightbox -->
<div id="imgLightbox">
  <span id="imgLightboxClose">✕</span>
  <img id="imgLightboxImg" src="" alt="">
  <div id="imgLightboxName"></div>
</div>

<!-- Add-item FAB (Manager/Boss only) -->
<button class="add-item-fab" id="addItemFab" onclick="openAddItemModal()">＋</button>

<!-- Add-item sheet modal -->
<div class="add-item-overlay" id="addItemOverlay" onclick="closeAddItemOverlayBg(event)">
  <div class="add-item-sheet">
    <div class="ai-handle"></div>
    <div class="ai-title">➕ 新增物品</div>
    <!-- Photo -->
    <div class="ai-photo-area" id="aiPhotoArea" onclick="triggerPhotoInput()">
      <img id="aiPhotoPreview" style="display:none">
      <div class="ai-photo-placeholder" id="aiPhotoPlaceholder">
        <div style="font-size:28px">📷</div>
        <div>拍照 / 选图（可选）</div>
      </div>
    </div>
    <input type="file" id="aiPhotoInput" accept="image/*" capture="environment"
           style="display:none" onchange="onPhotoSelected(this)">
    <!-- Name -->
    <label class="ai-label">物品名称 <span style="color:#d32f2f">*</span></label>
    <input id="ai_name" class="ai-input" type="text" placeholder="例：五花肉">
    <!-- Category -->
    <label class="ai-label">类别 <span style="color:#d32f2f">*</span></label>
    <select id="ai_cat" class="ai-input"></select>
    <!-- Unit -->
    <label class="ai-label">计量单位 <span style="color:#d32f2f">*</span></label>
    <select id="ai_unit" class="ai-input" onchange="onUnitChange(this)">
      <option value="kg">kg（公斤）</option>
      <option value="g">g（克）</option>
      <option value="包">包</option>
      <option value="盒">盒</option>
      <option value="瓶">瓶</option>
      <option value="桶">桶</option>
      <option value="箱">箱</option>
      <option value="袋">袋</option>
      <option value="份">份</option>
      <option value="条">条</option>
      <option value="罐">罐</option>
      <option value="升">升（L）</option>
      <option value="毫升">毫升（mL）</option>
      <option value="个">个</option>
      <option value="片">片</option>
      <option value="支">支</option>
    </select>
    <!-- Pkg qty (shown only for pkg units) -->
    <div id="aiPkgRow" style="display:none">
      <label class="ai-label">每包件数 <span style="color:#d32f2f">*</span></label>
      <input id="ai_pkg_qty" class="ai-input" type="number" min="1" placeholder="例：10">
    </div>
    <button id="addItemSaveBtn" class="ai-save-btn" onclick="saveNewItem()">+ 添加物品</button>
    <button class="ai-cancel-btn" onclick="closeAddItemOverlayDirect()">取消</button>
  </div>
</div>

<!-- Toast notification -->
<div id="mcToast"></div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay" style="display:none" onclick="closeModalOverlay(event)">
  <div class="modal-box" onclick="event.stopPropagation()">
    <div class="modal-icon" id="modalIcon"></div>
    <div class="modal-title" id="modalTitle"></div>
    <div class="modal-msg" id="modalMsg"></div>
    <button class="modal-btn" id="modalPrimaryBtn"></button>
    <button class="modal-btn-outline" id="modalSecondaryBtn" style="display:none"></button>
  </div>
</div>

<script>
  /* ── Server-injected constant ── */
  var APP_URL = '<?= appUrl ?>';

  /* ── localStorage keys ── */
  var LS_USER_KEY   = 'ims_user';
  var DRAFT_PREFIX  = 'mckd_';

  /* ── State ── */
  var currentUser  = null;
  var allItems     = [];
  var currentCat   = '全部';
  var submitting   = false;

  /* ════════════════════════════════
     INIT
  ════════════════════════════════ */
  window.onload = function() {
    var stored = localStorage.getItem(LS_USER_KEY);
    if (stored) {
      try {
        var user = JSON.parse(stored);
        if (user && user.success) {
          currentUser = user;
          showCheck();
          return;
        }
      } catch (e) {}
      localStorage.removeItem(LS_USER_KEY);
    }
    showLogin();
  };

  /* ════════════════════════════════
     LOGIN
  ════════════════════════════════ */
  function showLogin() {
    document.getElementById('loginView').style.display  = 'flex';
    document.getElementById('checkView').style.display  = 'none';
  }

  /* Enter key triggers login */
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && document.getElementById('loginView').style.display !== 'none') {
      doLogin();
    }
  });

  function doLogin() {
    var u = document.getElementById('usernameInput').value.trim();
    var p = document.getElementById('passwordInput').value;
    if (!u || !p) { showLoginError('请填写员工编号和密码'); return; }
    setLoginLoading(true);
    clearLoginError();
    google.script.run
      .withSuccessHandler(onLoginResult)
      .withFailureHandler(onLoginError)
      .verifyStaff(u, p);
  }

  function onLoginResult(result) {
    setLoginLoading(false);
    if (result && result.success) {
      localStorage.setItem(LS_USER_KEY, JSON.stringify(result));
      currentUser = result;
      showCheck();
    } else {
      showLoginError((result && result.error) || '登录失败，请重试');
    }
  }

  function onLoginError(err) {
    setLoginLoading(false);
    showLoginError('网络错误，请检查连接后重试');
  }

  function setLoginLoading(on) {
    document.getElementById('loginBtn').disabled            = on;
    document.getElementById('btnSpinner').style.display     = on ? 'block' : 'none';
    document.getElementById('btnText').textContent          = on ? '登录中...' : '登录';
  }

  function showLoginError(msg) {
    var el = document.getElementById('loginError');
    el.textContent    = msg;
    el.style.display  = 'block';
  }

  function clearLoginError() {
    document.getElementById('loginError').style.display = 'none';
  }

  /* ════════════════════════════════
     CHECK VIEW
  ════════════════════════════════ */
  function showCheck() {
    document.getElementById('loginView').style.display  = 'none';
    document.getElementById('checkView').style.display  = 'block';
    document.getElementById('staffLabel').textContent   =
      (currentUser.name || currentUser.username) + ' · ' + (currentUser.role || '员工');
    // Show add-item FAB for Manager/Boss
    var _role = String(currentUser.role || '').trim().toLowerCase();
    if (_role === 'manager' || _role === 'boss') {
      document.getElementById('addItemFab').style.display = 'flex';
    }
    loadItems();
  }

  function loadItems() {
    document.getElementById('statusArea').style.display   = 'block';
    document.getElementById('itemsList').style.display    = 'none';
    document.getElementById('catTabs').innerHTML          = '';
    document.getElementById('statusArea').innerHTML       =
      '<div class="spinner"></div><div>正在加载盘点数据...</div>';

    google.script.run
      .withSuccessHandler(onItemsLoaded)
      .withFailureHandler(onItemsError)
      .getTodayCheckItems(currentUser.username);
  }

  function onItemsError() {
    document.getElementById('statusArea').innerHTML =
      '<div style="font-size:32px;margin-bottom:10px">⚠️</div>' +
      '<div style="color:#d32f2f;margin-bottom:14px">加载失败，请刷新重试</div>' +
      '<button onclick="loadItems()" style="padding:8px 20px;background:#d32f2f;' +
      'color:#fff;border:none;border-radius:8px;font-size:14px;cursor:pointer">重试</button>';
  }

  function onItemsLoaded(resp) {
    if (!resp || !resp.success) { onItemsError(); return; }
    allItems = resp.items || [];
    document.getElementById('totalCount').textContent = allItems.length;
    buildCatTabs(resp.categories);
    renderItems(currentCat);
    restoreDrafts();
    updateProgress();
  }

  /* ════════════════════════════════
     CATEGORY TABS
  ════════════════════════════════ */
  function buildCatTabs(categories) {
    var tabs = document.getElementById('catTabs');
    tabs.innerHTML = '';
    var cats = ['全部'];

    if (categories) {
      Object.keys(categories).forEach(function(c) { cats.push(c); });
    } else {
      var seen = {};
      allItems.forEach(function(it) {
        if (!seen[it.category]) { seen[it.category] = true; cats.push(it.category); }
      });
    }

    cats.forEach(function(c) {
      var el = document.createElement('div');
      el.className = 'cat-tab' + (c === currentCat ? ' active' : '');
      el.textContent = c;
      el.onclick = function() { selectCat(c); };
      tabs.appendChild(el);
    });
  }

  function selectCat(cat) {
    currentCat = cat;
    document.querySelectorAll('.cat-tab').forEach(function(el) {
      el.classList.toggle('active', el.textContent === cat);
    });
    renderItems(cat);
    restoreDrafts();
  }

  /* ════════════════════════════════
     RENDER ITEMS
  ════════════════════════════════ */
  var PLACEHOLDER_IMG = 'data:image/svg+xml,' + encodeURIComponent(
    '<svg xmlns="http://www.w3.org/2000/svg" width="52" height="52">' +
    '<rect width="52" height="52" fill="#f0f0f0"/>' +
    '<text x="26" y="33" font-size="22" text-anchor="middle">📦</text></svg>'
  );

  function renderItems(cat) {
    var list     = document.getElementById('itemsList');
    var filtered = cat === '全部'
      ? allItems
      : allItems.filter(function(it) { return it.category === cat; });

    if (filtered.length === 0) {
      document.getElementById('statusArea').style.display  = 'block';
      document.getElementById('statusArea').innerHTML      =
        '<div style="font-size:32px;margin-bottom:8px">📭</div>' +
        '<div>该分类暂无需盘点的物品</div>';
      list.style.display = 'none';
      return;
    }

    document.getElementById('statusArea').style.display = 'none';
    list.style.display = 'block';
    list.innerHTML = '';
    filtered.forEach(function(item) { list.appendChild(makeCard(item)); });
  }

  function makeCard(item) {
    var draft    = localStorage.getItem(DRAFT_PREFIX + item.id);
    var hasDraft = draft !== null && draft !== '';

    var card = document.createElement('div');
    card.className = 'item-card' + (hasDraft ? ' filled' : '');
    card.id = 'card_' + item.id;

    /* Status badge */
    var sc = 'ok', st = '正常';
    if (item.checked)                           { sc = 'checked';  st = '已盘'; }
    else if (item.currentQty <= 0)              { sc = 'critical'; st = '缺货'; }
    else if (item.currentQty <= item.minStock)  { sc = 'low';      st = '偏低'; }

    /* Image */
    var imgEl = document.createElement('img');
    imgEl.className = 'item-img';
    var _realUrl = (item.imageUrl && item.imageUrl.trim() && /^https?:\/\//.test(item.imageUrl.trim()))
                  ? item.imageUrl.trim() : '';
    imgEl.src     = _realUrl || PLACEHOLDER_IMG;
    imgEl.alt     = item.name;
    imgEl.loading = 'lazy';
    imgEl.onerror = function() { this.src = PLACEHOLDER_IMG; };
    if (_realUrl) {
      imgEl.onclick = (function(s, n) {
        return function(e) { e.stopPropagation(); showImgLightbox(s, n); };
      })(_realUrl, item.name);
    }

    /* Info */
    var infoEl = document.createElement('div');
    infoEl.className = 'item-info';
    infoEl.innerHTML =
      '<div class="item-name">' + escHtml(item.name) + '</div>' +
      '<div class="item-meta">库存: ' + item.currentQty + ' ' + escHtml(item.unit) + '</div>' +
      '<span class="item-status ' + sc + '">' + st + '</span>';

    /* Qty input */
    var qtyWrap = document.createElement('div');
    qtyWrap.className = 'qty-wrap';

    var input = document.createElement('input');
    input.type        = 'number';
    input.inputMode   = 'decimal';
    input.className   = 'qty-input' + (hasDraft ? ' has-value' : '');
    input.id          = 'qty_' + item.id;
    input.value       = hasDraft ? draft : '';
    input.placeholder = '数量';
    input.min         = '0';
    input.step        = '0.5';
    input.dataset.itemId = item.id;
    input.addEventListener('input', function() { onQtyInput(this, item); });

    var unitEl = document.createElement('div');
    unitEl.className   = 'qty-unit';
    unitEl.textContent = item.unit;

    qtyWrap.appendChild(input);
    qtyWrap.appendChild(unitEl);

    card.appendChild(imgEl);
    card.appendChild(infoEl);
    card.appendChild(qtyWrap);
    return card;
  }

  function onQtyInput(input, item) {
    var val = input.value.trim();
    var cardEl = document.getElementById('card_' + item.id);
    if (val !== '') {
      localStorage.setItem(DRAFT_PREFIX + item.id, val);
      input.classList.add('has-value');
      if (cardEl) cardEl.classList.add('filled');
    } else {
      localStorage.removeItem(DRAFT_PREFIX + item.id);
      input.classList.remove('has-value');
      if (cardEl) cardEl.classList.remove('filled');
    }
    updateProgress();
  }

  /* ════════════════════════════════
     DRAFTS (localStorage)
  ════════════════════════════════ */
  function restoreDrafts() {
    allItems.forEach(function(item) {
      var draft = localStorage.getItem(DRAFT_PREFIX + item.id);
      if (draft !== null && draft !== '') {
        var input  = document.getElementById('qty_' + item.id);
        var cardEl = document.getElementById('card_' + item.id);
        if (input) {
          input.value = draft;
          input.classList.add('has-value');
        }
        if (cardEl) cardEl.classList.add('filled');
      }
    });
  }

  function clearDrafts() {
    allItems.forEach(function(item) {
      localStorage.removeItem(DRAFT_PREFIX + item.id);
    });
  }

  /* ════════════════════════════════
     PROGRESS
  ════════════════════════════════ */
  function updateProgress() {
    var filled = 0;
    allItems.forEach(function(item) {
      var v = localStorage.getItem(DRAFT_PREFIX + item.id);
      if (v !== null && v !== '') filled++;
    });
    var total = allItems.length;
    var pct   = total > 0 ? Math.round(filled / total * 100) : 0;

    document.getElementById('filledCount').textContent     = filled;
    document.getElementById('totalCount').textContent      = total;
    document.getElementById('progressPct').textContent     = pct + '%';
    document.getElementById('progressFill').style.width   = pct + '%';
    document.getElementById('submitBtn').disabled          = (filled === 0);
  }

  /* ════════════════════════════════
     SUBMIT
  ════════════════════════════════ */
  function confirmSubmit() {
    if (submitting) return;
    var items   = getFilledItems();
    var filled  = items.length;
    var missing = allItems.length - filled;

    if (missing > 0) {
      showModal('📋', '确认提交？',
        '已填写 ' + filled + ' 项，还有 ' + missing + ' 项未填。\n确定要提交吗？',
        '确认提交', doSubmit,
        '继续填写', closeModal);
    } else {
      showModal('✅', '确认提交',
        '所有 ' + filled + ' 项已填写完毕，确认提交盘点记录？',
        '提交', doSubmit,
        '取消', closeModal);
    }
  }

  function getFilledItems() {
    var result = [];
    allItems.forEach(function(item) {
      var v = localStorage.getItem(DRAFT_PREFIX + item.id);
      if (v !== null && v !== '') {
        result.push({ id: item.id, name: item.name, qty: parseFloat(v) || 0, unit: item.unit });
      }
    });
    return result;
  }

  function doSubmit() {
    closeModal();
    if (submitting) return;
    submitting = true;
    document.getElementById('submitBtn').disabled   = true;
    document.getElementById('submitBtn').textContent = '提交中...';

    google.script.run
      .withSuccessHandler(onSubmitDone)
      .withFailureHandler(onSubmitError)
      .submitCheckRecord(currentUser.username, getFilledItems());
  }

  function onSubmitDone(resp) {
    submitting = false;
    document.getElementById('submitBtn').disabled    = false;
    document.getElementById('submitBtn').textContent = '提交盘点记录';

    if (!resp || !resp.success) {
      showModal('❌', '提交失败', (resp && resp.error) || '未知错误，请重试', '关闭', closeModal);
      return;
    }

    /* Clear drafts and reset inputs */
    clearDrafts();
    allItems.forEach(function(item) {
      var input  = document.getElementById('qty_' + item.id);
      var cardEl = document.getElementById('card_' + item.id);
      if (input)  { input.value = ''; input.classList.remove('has-value'); }
      if (cardEl) cardEl.classList.remove('filled');
    });
    updateProgress();

    /* Build success message */
    var abnormal = resp.abnormalItems && resp.abnormalItems.length > 0;
    var msg = '成功提交 ' + (resp.updated || 0) + ' 条盘点记录。';
    if (abnormal) {
      msg += '\n\n⚠️ 发现 ' + resp.abnormalItems.length + ' 项异常：\n';
      resp.abnormalItems.slice(0, 5).forEach(function(it) {
        msg += '· ' + (it.name || it.itemName || '') + '\n';
      });
    }
    showModal(abnormal ? '⚠️' : '✅', '提交成功', msg, '确认', closeModal);
  }

  function onSubmitError() {
    submitting = false;
    document.getElementById('submitBtn').disabled    = false;
    document.getElementById('submitBtn').textContent = '提交盘点记录';
    showModal('❌', '网络错误', '提交失败，请检查网络后重试', '关闭', closeModal);
  }

  /* ════════════════════════════════
     LOGOUT
  ════════════════════════════════ */
  function doLogout() {
    localStorage.removeItem(LS_USER_KEY);
    clearDrafts();
    currentUser = null;
    allItems    = [];
    currentCat  = '全部';
    document.getElementById('usernameInput').value = '';
    document.getElementById('passwordInput').value = '';
    clearLoginError();
    showLogin();
  }

  /* ════════════════════════════════
     MODAL
  ════════════════════════════════ */
  function showModal(icon, title, msg, primaryLabel, primaryFn, secondaryLabel, secondaryFn) {
    document.getElementById('modalIcon').textContent  = icon;
    document.getElementById('modalTitle').textContent = title;
    document.getElementById('modalMsg').textContent   = msg;

    var pBtn = document.getElementById('modalPrimaryBtn');
    pBtn.textContent = primaryLabel;
    pBtn.onclick     = primaryFn || closeModal;

    var sBtn = document.getElementById('modalSecondaryBtn');
    if (secondaryLabel) {
      sBtn.textContent    = secondaryLabel;
      sBtn.onclick        = secondaryFn || closeModal;
      sBtn.style.display  = 'block';
    } else {
      sBtn.style.display  = 'none';
    }

    document.getElementById('modalOverlay').style.display = 'flex';
  }

  function closeModalOverlay(e) {
    if (e && e.target === document.getElementById('modalOverlay')) closeModal();
  }

  function closeModal() {
    document.getElementById('modalOverlay').style.display = 'none';
  }

  /* ════════════════════════════════
     UTILITY
  ════════════════════════════════ */
  function escHtml(str) {
    return String(str || '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  /* ════════════════════════════════
     ADD ITEM (Manager/Boss only)
  ════════════════════════════════ */
  var PKG_UNITS = ['包','盒','箱','袋'];
  var pendingPhotoBase64 = null, pendingPhotoMime = null, pendingPhotoName = null;

  function onUnitChange(sel) {
    var show = PKG_UNITS.indexOf(sel.value) >= 0;
    document.getElementById('aiPkgRow').style.display = show ? '' : 'none';
    if (!show) document.getElementById('ai_pkg_qty').value = '';
  }

  function triggerPhotoInput() {
    document.getElementById('aiPhotoInput').click();
  }

  function onPhotoSelected(input) {
    if (!input.files || !input.files[0]) return;
    var file = input.files[0];
    var reader = new FileReader();
    reader.onload = function(e) {
      var dataUrl = e.target.result;
      var parts   = dataUrl.split(',');
      pendingPhotoBase64 = parts[1];
      pendingPhotoMime   = file.type;
      pendingPhotoName   = file.name;
      var preview = document.getElementById('aiPhotoPreview');
      preview.src = dataUrl;
      preview.style.display = 'block';
      document.getElementById('aiPhotoPlaceholder').style.display = 'none';
    };
    reader.readAsDataURL(file);
  }

  function openAddItemModal() {
    // Reset photo
    pendingPhotoBase64 = pendingPhotoMime = pendingPhotoName = null;
    document.getElementById('aiPhotoPreview').style.display     = 'none';
    document.getElementById('aiPhotoPreview').src               = '';
    document.getElementById('aiPhotoPlaceholder').style.display = 'flex';
    document.getElementById('aiPhotoInput').value               = '';
    // Reset fields
    document.getElementById('ai_name').value          = '';
    document.getElementById('ai_unit').selectedIndex  = 0;
    document.getElementById('aiPkgRow').style.display = 'none';
    document.getElementById('ai_pkg_qty').value       = '';
    // Populate category select
    var catSel = document.getElementById('ai_cat');
    catSel.innerHTML = '';
    var defaultCats = ['肉类','菜类','海鲜','调料','饮料','主食',
      '蘸料','油料','冷冻','干货','丸子','锅底','甜品','酒水','小吃','消耗品','餐具','其他'];
    var merged = {};
    defaultCats.forEach(function(c){ merged[c] = 1; });
    allItems.forEach(function(it){ if (it.category) merged[it.category] = 1; });
    var catList = Object.keys(merged).sort(function(a, b) {
      var ia = defaultCats.indexOf(a), ib = defaultCats.indexOf(b);
      if (ia >= 0 && ib >= 0) return ia - ib;
      if (ia >= 0) return -1; if (ib >= 0) return 1;
      return a.localeCompare(b);
    });
    catList.forEach(function(c) {
      var opt = document.createElement('option');
      opt.value = opt.textContent = c;
      catSel.appendChild(opt);
    });
    // Reset button
    var btn = document.getElementById('addItemSaveBtn');
    btn.disabled = false; btn.textContent = '+ 添加物品';
    document.getElementById('addItemOverlay').classList.add('show');
  }

  function saveNewItem() {
    var name     = document.getElementById('ai_name').value.trim();
    var cat      = document.getElementById('ai_cat').value;
    var unitBase = document.getElementById('ai_unit').value;
    var pkgQty   = document.getElementById('ai_pkg_qty').value.trim();
    if (!name) { showToast('请填写物品名称'); return; }
    var unit = unitBase;
    if (PKG_UNITS.indexOf(unitBase) >= 0) {
      if (!pkgQty || Number(pkgQty) < 1) { showToast('请填写每包件数'); return; }
      unit = unitBase + '(' + pkgQty + '件)';
    }
    var btn = document.getElementById('addItemSaveBtn');
    btn.disabled = true; btn.textContent = '保存中...';

    function doCreate(imageUrl) {
      google.script.run
        .withSuccessHandler(function(resp) {
          btn.disabled = false; btn.textContent = '+ 添加物品';
          if (resp && resp.success) {
            closeAddItemOverlayDirect();
            showToast('✅ 已添加：' + name);
            loadItems(); // refresh list
          } else {
            showToast('❌ ' + ((resp && resp.error) || '添加失败'));
          }
        })
        .withFailureHandler(function(err) {
          btn.disabled = false; btn.textContent = '+ 添加物品';
          showToast('❌ ' + (err.message || '网络错误'));
        })
        .createItem(currentUser.username, { name: name, category: cat, unit: unit, imageUrl: imageUrl || '' });
    }

    if (pendingPhotoBase64) {
      google.script.run
        .withSuccessHandler(function(resp) {
          doCreate(resp && resp.success ? resp.url : '');
        })
        .withFailureHandler(function() { doCreate(''); })
        .uploadItemPhoto(currentUser.username, pendingPhotoBase64, pendingPhotoMime, pendingPhotoName);
    } else {
      doCreate('');
    }
  }

  function closeAddItemOverlayBg(evt) {
    if (evt.target === document.getElementById('addItemOverlay')) closeAddItemOverlayDirect();
  }
  function closeAddItemOverlayDirect() {
    document.getElementById('addItemOverlay').classList.remove('show');
  }

  var _toastTimer = null;
  function showToast(msg) {
    var el = document.getElementById('mcToast');
    el.textContent   = msg;
    el.style.display = 'block';
    if (_toastTimer) clearTimeout(_toastTimer);
    _toastTimer = setTimeout(function() { el.style.display = 'none'; }, 2800);
  }

  /* ── Photo lightbox ── */
  function showImgLightbox(src, name) {
    document.getElementById('imgLightboxImg').src          = src;
    document.getElementById('imgLightboxName').textContent = name;
    document.getElementById('imgLightbox').classList.add('show');
  }
  function closeImgLightbox() {
    document.getElementById('imgLightbox').classList.remove('show');
    document.getElementById('imgLightboxImg').src = '';
  }
  // Lightbox event listeners (run once)
  (function() {
    var lb = document.getElementById('imgLightbox');
    lb.addEventListener('click', closeImgLightbox);
    document.getElementById('imgLightboxImg').addEventListener('click', function(e) {
      e.stopPropagation();
    });
    document.getElementById('imgLightboxClose').addEventListener('click', function(e) {
      e.stopPropagation();
      closeImgLightbox();
    });
  })();
</script>
</body>
</html>
